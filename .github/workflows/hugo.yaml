name: Build Hugo and sync hugo-build

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hugo-build-sync
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.128.0
      TARGET_BRANCH: hugo-build
      MANIFEST_FILE: .hugo-generated-manifest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo CLI
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/Los_Angeles
        run: |
          hugo \
            --gc \
            --minify

      - name: Build generated file manifest
        run: |
          cd public
          find . -type f -print | sed 's#^\./##' | LC_ALL=C sort > "${{ runner.temp }}/new_manifest.txt"

      - name: Prepare target branch worktree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${TARGET_BRANCH}"
            git worktree add "${{ runner.temp }}/target" "origin/${TARGET_BRANCH}"
          else
            git worktree add "${{ runner.temp }}/target"
            cd "${{ runner.temp }}/target"
            git checkout --orphan "${TARGET_BRANCH}"
            git rm -rf . >/dev/null 2>&1 || true
            git commit --allow-empty -m "chore: initialize ${TARGET_BRANCH}"
            git push origin HEAD:"${TARGET_BRANCH}"
            cd "${GITHUB_WORKSPACE}"
          fi

      - name: Sync generated files to target branch
        run: |
          SOURCE_DIR="${GITHUB_WORKSPACE}/public"
          TARGET_DIR="${{ runner.temp }}/target"
          OLD_MANIFEST="${{ runner.temp }}/old_manifest.txt"
          NEW_MANIFEST="${{ runner.temp }}/new_manifest.txt"

          if [[ -f "${TARGET_DIR}/${MANIFEST_FILE}" ]]; then
            LC_ALL=C sort "${TARGET_DIR}/${MANIFEST_FILE}" > "${OLD_MANIFEST}"
          else
            : > "${OLD_MANIFEST}"
          fi

          # Delete previously generated files that are no longer produced.
          comm -23 "${OLD_MANIFEST}" "${NEW_MANIFEST}" | while IFS= read -r rel; do
            [[ -z "${rel}" ]] && continue
            rm -f "${TARGET_DIR}/${rel}"
          done

          while IFS= read -r rel; do
            [[ -z "${rel}" ]] && continue
            mkdir -p "${TARGET_DIR}/$(dirname "${rel}")"
            cp -f "${SOURCE_DIR}/${rel}" "${TARGET_DIR}/${rel}"
          done < "${NEW_MANIFEST}"

          cp "${NEW_MANIFEST}" "${TARGET_DIR}/${MANIFEST_FILE}"

      - name: Commit and push when changed
        run: |
          cd "${{ runner.temp }}/target"
          git add -A

          if git diff --cached --quiet; then
            echo "No generated file changes detected."
            exit 0
          fi

          git commit -m "chore: sync Hugo build from ${GITHUB_SHA::7}"
          git push origin HEAD:"${TARGET_BRANCH}"

